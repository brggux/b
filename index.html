<style>
:root{
  --bg:#162E1A;--bg2:#0d0d0d;--tile:#181818;--tile2:#141414;--tile-border:rgba(255,255,255,0.07);
  --accent:#3ddd65;--accent-dim:#1a7a3a;--accent-border:rgba(61,221,101,0.7);--accent-bright:#ffffff;
  --white:#e8e8e8;--ui:rgba(232,232,232,0.52);--ui2:rgba(232,232,232,0.32);
  --red:#e05555;--sep:rgba(255,255,255,0.06);--radius:16px;
  --safe-top:env(safe-area-inset-top,44px);--safe-bottom:env(safe-area-inset-bottom,20px);
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);color:#ffffff;font-family:-apple-system,'SF Pro Text',BlinkMacSystemFont,sans-serif;height:100%;overflow:hidden;-webkit-font-smoothing:antialiased;font-weight:400;}
#app{height:100dvh;display:flex;flex-direction:column;overflow:hidden;position:relative;}

/* SCREENS */
.screen{position:absolute;inset:0;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .55s cubic-bezier(.16,1,.3,1);background:var(--bg);overflow:hidden;}
.screen.active{transform:translateX(0);}
.screen.slide-out{transform:translateX(-28%);}
#home{transform:translateX(0);}

/* HOME LAYOUT */
.habits-scroll{position:absolute;top:0;bottom:0;left:0;right:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;display:flex;flex-direction:column;align-items:stretch;justify-content:center;padding-top:calc(var(--safe-bottom) + 124px);padding-bottom:calc(var(--safe-bottom) + 124px);}
.habits-scroll::-webkit-scrollbar{display:none;}
.habits-inner{width:100%;max-width:500px;margin:auto;padding:0 28px;box-sizing:border-box;}
.habits-zone{display:flex;flex-direction:column;gap:0;}

/* TEMPS TRAY */

/* HABIT TILE */
.habit-row{display:flex;align-items:center;gap:16px;padding:20px 26px 20px 28px;margin-bottom:14px;background:rgba(255,255,255,0.32);border:none;border-radius:var(--radius);cursor:pointer;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);touch-action:auto;}

.habit-row.row-enter,.habit-row.row-visible{opacity:1;transform:none;}
.habit-row:active{opacity:.55;}
.habit-row.dimmed{opacity:.22;transition:opacity .4s ease;}
.habit-row.vanishing{overflow:hidden;pointer-events:none;box-shadow:none!important;}
.habit-row.temp-row .habit-name{color:rgba(120,235,120,1);font-weight:500;}
.habit-name{font-size:23px;font-weight:400;color:#ffffff;letter-spacing:-.02em;flex:1;user-select:none;text-align:center;}

/* HABIT GROUPS SEPARATOR */

/* DONE STATE */
.done-state{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity 1.1s cubic-bezier(.16,1,.3,1);}
.done-state.show{opacity:1;}
.done-state.show-instant .done-mark{ animation:none!important; opacity:1; transform:scale(1); }
.done-state.show-instant .done-mark svg{ animation:none!important; opacity:1; transform:none; }
@keyframes pbShimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
@keyframes pbPop{0%{transform:scaleY(1);}40%{transform:scaleY(1.6);}70%{transform:scaleY(0.85);}100%{transform:scaleY(1);}}
.pb-fill.pop{animation:pbPop .4s cubic-bezier(.34,1.56,.64,1);}

@keyframes doneMarkFade{
  0%  { opacity:0; filter:blur(2px); }
  100%{ opacity:1; filter:blur(0); }
}
@keyframes doneIconDrift{
  0%  { opacity:0; transform:scale(0.95); }
  100%{ opacity:1; transform:scale(1); }
}
.done-mark{ display:flex; align-items:center; justify-content:center; width:77px; height:77px; opacity:0; }
.done-state.show .done-mark{ animation:doneMarkFade 0.5s cubic-bezier(.4,0,.2,1) forwards; }
.done-mark svg{ color:#00ff88; width:77px; height:77px; opacity:0; display:block; overflow:visible; }
.done-state.show .done-mark svg{ animation:doneIconDrift 0.45s .05s cubic-bezier(.4,0,.2,1) forwards; }


/* SETTINGS */
.btn-back{display:flex;align-items:center;justify-content:center;width:48px;height:48px;background:none;border:none;color:var(--accent);font-size:28px;cursor:pointer;opacity:.7;line-height:1;}
.btn-back:active{opacity:1;}
.settings-scroll{flex:1;overflow-y:auto;scrollbar-width:none;padding-top:16px;padding-bottom:calc(var(--safe-bottom)+40px);}
.settings-scroll::-webkit-scrollbar{display:none;}
.s-section{padding:0 18px;margin-top:20px;}

/* SECTOR BLOCK */
.sector-block{margin-bottom:36px;}
.sector-block-header{display:flex;align-items:center;justify-content:center;padding:10px 4px;cursor:pointer;transition:opacity .15s;}
.sector-block-header:active{opacity:.6;}
.sbn{font-size:19px;color:#ffffff;font-weight:400;}
.sector-habits-box{margin-top:6px;background:rgba(255,255,255,0.32);border-radius:12px;overflow:hidden;padding:2px 0;}
.sector-habit-row{display:flex;align-items:center;justify-content:center;gap:10px;padding:11px 16px;cursor:grab;touch-action:pan-y;transition:opacity .15s;user-select:none;-webkit-user-select:none;position:relative;overflow:hidden;}
.sector-habit-row:active{opacity:.5;cursor:grabbing;}
.shr-name{font-size:19px;color:#ffffff;font-weight:400;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;}
.add-habit-row{display:flex;align-items:center;justify-content:center;padding:10px 4px;color:rgba(255,255,255,0.55);cursor:pointer;touch-action:auto;transition:opacity .15s;background:transparent!important;}
.add-habit-row:active{opacity:.8;}
.add-sector-btn-icon{display:flex;align-items:center;justify-content:center;width:100%;padding:12px;border-radius:12px;border:none;background:none;color:rgba(255,255,255,0.55);cursor:pointer;transition:all .15s;}
.add-sector-btn-icon:active{opacity:.8;}

/* SECTOR EDIT PANEL */
.sector-edit-panel{display:none;}
.sector-block.expanded .sector-edit-panel{display:block;}
.sector-block.expanded .sector-block-header{display:none;}
.time-input{background:rgba(255,255,255,0.12);border:none;border-radius:8px;padding:7px 8px;color:#ffffff;font-size:15px;font-weight:600;font-family:inherit;outline:none;width:52px;text-align:center;transition:background .2s;}
.time-input:focus{background:rgba(255,255,255,0.2);}
.time-colon{color:var(--ui);opacity:.5;font-size:15px;}
.del-sched-btn{width:22px;height:22px;background:none;border:none;color:var(--ui);opacity:.25;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:opacity .15s;flex-shrink:0;}
.del-sched-btn:active{opacity:.8;color:var(--red);}
.add-schedule-btn{width:30px;height:30px;border-radius:50%;border:none;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.5);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity .15s;}
.add-schedule-btn:active{opacity:.9;}
.sec-act-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px 28px;border-radius:12px;background:rgba(255,255,255,0.05);border:none;font-size:15px;font-weight:400;font-family:inherit;cursor:pointer;transition:all .15s;color:var(--ui);}
.sec-act-btn.danger{color:var(--red);background:rgba(224,85,85,0.07);}
.sec-act-btn
.sec-act-btn:active{opacity:.6;}

/* BOTTOM ICON ROW */

/* SETTINGS PANEL ROWS */

/* SETTINGS LOCK BUTTON at bottom */

/* PANELS */

.empty{display:flex;align-items:center;justify-content:center;padding:16px;}

/* DONE STATE — tasks (niebieski) */

.drag-lift{opacity:.45!important;background:rgba(255,255,255,0.09)!important;}

/* HABIT DETAIL */
.habit-detail-screen{position:fixed;top:0;left:0;right:0;height:100%;z-index:300;background:var(--bg);transform:translateY(100%);transition:transform .38s cubic-bezier(.32,.72,0,1);display:flex;flex-direction:column;overflow:hidden;}
.habit-detail-screen.open{transform:translateY(0);}
.hd-body{flex:1;overflow-y:auto;display:flex;flex-direction:column;padding:8px 24px calc(var(--safe-bottom)+60px);scrollbar-width:none;}
.hd-notch-bar{
  flex-shrink:0;
  padding-top:max(env(safe-area-inset-top,44px), 44px);
  padding-bottom:12px;
  display:flex;align-items:flex-end;justify-content:center;
  background:var(--bg);
  min-height:72px;
}
.hd-body::-webkit-scrollbar{display:none;}
.days-row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:30px;}
.day-btn{width:42px;height:42px;border-radius:50%;border:none;background:rgba(255,255,255,0.06);color:#ffffff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .18s;}
.day-btn.active{background:var(--accent-dim);color:var(--accent-bright);}
.url-input{flex:1;background:rgba(255,255,255,0.32);border:none;border-radius:12px;padding:14px 16px;color:#ffffff;font-size:16px;font-weight:400;font-family:inherit;outline:none;min-width:0;transition:background .2s;}
.url-input:focus{background:rgba(255,255,255,0.38);}
.url-input::placeholder{color:rgba(255,255,255,0.3);}

.hd-spacer{flex:1;min-height:20px;}
.save-btn{width:100%;background:#1a7a3a;color:#fff;font-size:16px;font-weight:600;border:none;border-radius:12px;padding:15px;cursor:pointer;font-family:inherit;transition:opacity .15s;}
.save-btn:active{opacity:.7;}
.delete-btn{width:100%;background:none;border:none;padding:14px;margin-top:4px;color:rgba(224,85,85,0.5);font-size:14px;font-family:inherit;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;border-radius:12px;}
.delete-btn:active{color:var(--red);}
.delete-btn.confirm-pending{color:#fff;background:rgba(224,85,85,0.85);border-radius:12px;}
.sec-act-btn.danger.confirm-pending{color:#fff;background:rgba(224,85,85,0.85);}

.hd-name-input{flex:1;background:rgba(255,255,255,0.32);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:none;border-radius:14px;padding:15px 18px;color:#ffffff;font-size:21px;font-weight:400;font-family:inherit;outline:none;text-align:center;transition:background .2s;letter-spacing:-.02em;}
.hd-name-input:focus{background:rgba(255,255,255,0.42);}
.hd-name-input::placeholder{color:rgba(255,255,255,0.28);}

/* SETTINGS PANEL ROWS */

/* Time categories settings in settings panel */

</style>
</head>

<div id="app">

<!-- HOME -->
<div id="home" class="screen active">
  <div class="done-state" id="doneState">
    <div class="done-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 12 9 17 20 6"/></svg>
    </div>
  </div>
  <!-- Habits -->
  <div class="habits-scroll" id="habitsScroll">

      <div class="habits-zone" id="habitsList"></div>

  </div>
  <!-- Invisible settings trigger — bottom of screen -->
  <div onclick="openSettings()" style="position:fixed;bottom:0;left:0;right:0;height:160px;z-index:9;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;"></div>

const STATE_VERSION=2;

let _saveTimer=null;
let _lastPurgeDay='';
function _purgeOldEntries(){
  const t=today(); if(_lastPurgeDay===t) return; _lastPurgeDay=t;
  const now=new Date();
  if(state.daily){
    for(const dk of Object.keys(state.daily)){
      if(dk.startsWith('W-')){
        // Parse W-YYYY-WW, remove if older than ~26 weeks
        const [,y,w]=dk.split('-');
        const jan4=new Date(+y,0,4);
        const weekMs=(+w-1)*7*864e5;
        const weekDate=new Date(jan4.getTime()-((jan4.getDay()||7)-1)*864e5+weekMs);
        if((now-weekDate)/(864e5)>180) delete state.daily[dk];
      } else {
        if((now-new Date(dk+'T00:00:00'))/(864e5)>90) delete state.daily[dk];
      }
    }
  }
}
function save(){
  if(_saveTimer) clearTimeout(_saveTimer);
  _saveTimer=setTimeout(()=>{
    _saveTimer=null;
    _purgeOldEntries();
    try{ localStorage.setItem('hs9',JSON.stringify(state)); }catch{}
  },60);
}
function saveNow(){
  if(_saveTimer){ clearTimeout(_saveTimer); _saveTimer=null; }
  _purgeOldEntries();
  try{ localStorage.setItem('hs9',JSON.stringify(state)); }catch{}
}

// Each function: mutates state + saves + (optionally) renders

// ── Habits ──
function habitComplete(hId, val){
  getDayData().habits[hId] = val;
  save();
}
function habitAdd(data){
  const sectorId = data.sectorId || state.sectors[0]?.id;
  const order = state.habits.filter(h=>h.sectorId===sectorId).length;
  state.habits.push({id:'h'+Date.now(), order, ...data, sectorId});
  save();
}
function habitUpdate(hId, patch){
  const h = state.habits.find(x=>x.id===hId); if(!h) return;
  Object.assign(h, patch);
  save();
}
function habitDelete(hId){
  state.habits = state.habits.filter(x=>x.id!==hId);
  save();
}
function habitReorder(fromId, toId){
  const from=state.habits.find(h=>h.id===fromId), to=state.habits.find(h=>h.id===toId);
  if(!from||!to||from.sectorId!==to.sectorId) return false;
  const fi=state.habits.indexOf(from), ti=state.habits.indexOf(to);
  state.habits.splice(fi,1); state.habits.splice(ti,0,from);
  state.habits.filter(h=>h.sectorId===from.sectorId).forEach((h,i)=>h.order=i);
  save();
  return true;
}

// ── Sectors ──
function sectorAdd(){
  const id='s'+Date.now();
  state.sectors.push({id,name:'Nowy',schedules:[{startH:9,startM:0,endH:17,endM:0,weekdays:[0,1,2,3,4]}]});
  save();
  return id;
}
function sectorUpdate(sId, patch){
  const sec=state.sectors.find(s=>s.id===sId); if(!sec) return;
  Object.assign(sec, patch);
  invalidateActiveSectorCache();
  save();
}
function sectorDelete(sId){
  state.sectors = state.sectors.filter(s=>s.id!==sId);
  state.habits  = state.habits.filter(h=>h.sectorId!==sId);
  expandedSectors.delete(sId);
  invalidateActiveSectorCache();
  save();
}
function sectorSetDefault(sId){
  state.sectors.forEach(s=>{ s.isDefault = (s.id===sId ? !s.isDefault : false); });
  invalidateActiveSectorCache();
  save();
}

// ── Extras ──


function fmtDate(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
// ── DATE CACHE — recomputed once per day ──
let _todayCache='', _jsDayCache=-1;
function _refreshDateCache(){
  const d=new Date();
  _todayCache=fmtDate(d);
  _jsDayCache=d.getDay()===0?6:d.getDay()-1;
  // schedule next refresh at midnight
  const now=d; const midnight=new Date(now); midnight.setHours(24,0,0,0);
  setTimeout(_refreshDateCache, midnight-now);
}
_refreshDateCache();
function today(){ return _todayCache; }
function jsDay(){ return _jsDayCache; }
function getDayData(){ const k=today(); if(!state.daily[k]) state.daily[k]={habits:{}}; return state.daily[k]; }
function isDone(v){ return v!==undefined&&v!==null&&v!==false&&v!==''; }

// ── WEEKEND — nawyk z dniami [5,6] zaliczany raz na cały weekend ──
function isWeekendHabit(h){ return h.days.includes(5)&&h.days.includes(6)&&h.days.length===2; }
function weekendKey(){
  const d=new Date();
  // ISO week number
  const tmp=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  tmp.setUTCDate(tmp.getUTCDate()+4-(tmp.getUTCDay()||7));
  const yearStart=new Date(Date.UTC(tmp.getUTCFullYear(),0,1));
  const wk=Math.ceil((((tmp-yearStart)/86400000)+1)/7);
  return `W-${tmp.getUTCFullYear()}-${String(wk).padStart(2,'0')}`;
}
function isWeekendDone(hId){
  return isDone(state.daily?.[weekendKey()]?.habits?.[hId]);
}
function completeWeekend(hId){
  const k=weekendKey();
  if(!state.daily[k]) state.daily[k]={habits:{}};
  state.daily[k].habits[hId]=true;
  save();
}

let _activeSectorCache=null, _activeSectorCacheMin=-1;
function getActiveSector(){
  const now=new Date(); const curMin=now.getHours()*60+now.getMinutes();
  if(_activeSectorCache!==null && curMin===_activeSectorCacheMin) return _activeSectorCache;
  const jsd=jsDay();
  let result=null;
  for(const s of state.sectors)
    for(const sc of (s.schedules||[]))
      if(sc.weekdays.includes(jsd)&&curMin>=sc.startH*60+sc.startM&&curMin<sc.endH*60+sc.endM){ result=s; break; }
  if(!result) result=state.sectors.find(s=>s.isDefault)||null;
  _activeSectorCache=result; _activeSectorCacheMin=curMin;
  return result;
}
function invalidateActiveSectorCache(){ _activeSectorCache=null; }


// ── MODULE-LEVEL CONSTANTS ──

// ── SHARED ANIMATION HELPER ──
function animateRemoveRow(row, cb, dur=320){
  let _done=false;
  const finish=()=>{ if(_done) return; _done=true; row.remove(); cb&&cb(); };
  const cs=getComputedStyle(row);
  const h=row.offsetHeight, mb=parseFloat(cs.marginBottom)||0, pt=parseFloat(cs.paddingTop)||0, pb=parseFloat(cs.paddingBottom)||0;
  const a=row.animate([
    {opacity:1,height:h+'px',marginBottom:mb+'px',paddingTop:pt+'px',paddingBottom:pb+'px',overflow:'hidden'},
    {opacity:0,height:'0px',marginBottom:'0px',paddingTop:'0px',paddingBottom:'0px',overflow:'hidden'}
  ],{duration:dur,easing:'cubic-bezier(0.4,0,0.2,1)',fill:'forwards'});
  a.onfinish=finish;
  setTimeout(finish, dur+80);
}

// RENDEROWANIE — HOME
// ══════════════════════════════════════════════════════
let _rhTimer=null;
function renderHome(){
  if(_rhTimer) return;
  _rhTimer=requestAnimationFrame(()=>{ _rhTimer=null; _renderHomeNow(); });
}

function _renderHomeNow(){
  const sector=getActiveSector();
  const hList=document.getElementById('habitsList');
    const ds=document.getElementById('doneState');
  if(!hList) return;

  if(!sector){
    Array.from(hList.children).forEach(r=>animateRemoveRow(r,null,380));
    setTimeout(()=>{ hList.innerHTML=''; ds.classList.add('show'); },440);
    return;
  }
  const dd=getDayData(); const jsd=jsDay();
  const habits=state.habits
    .map((h,i)=>({h,i}))
    .filter(({h})=>h.sectorId===sector.id&&h.days.includes(jsd))
    .sort((a,b)=>(a.h.order||0)-(b.h.order||0)||(a.i-b.i))
    .map(({h})=>h);
  const remaining=habits.filter(h=>{
    if(isWeekendHabit(h)) return !isWeekendDone(h.id);
    return !isDone(dd.habits[h.id]);
  });

  if(remaining.length===0){
    Array.from(hList.children).forEach(r=>animateRemoveRow(r,null,380));
    setTimeout(()=>{ hList.innerHTML=''; ds.classList.add('show'); },400);
    return;
  }
  ds.classList.remove('show','show-instant');

  function diffZone(container, items, makeRow){
    Array.from(container.children).forEach(row=>{
      if(!items.find(it=>it.key===row.dataset.key)){
        row.classList.add('vanishing');
        animateRemoveRow(row, null, 320);
      }
    });
    items.forEach((item,i)=>{
      let row=container.querySelector(`[data-key="${item.key}"]`);
      if(!row){
        row=makeRow(item); row.dataset.key=item.key;
        container.insertBefore(row,container.children[i]||null);
      } else {
        if(row!==container.children[i]) container.insertBefore(row,container.children[i]||null);
        row.classList.remove('dimmed');
      }
    });
  }

  diffZone(hList, remaining.map(h=>({key:'h'+h.id,h})), item=>{
    const h=item.h, row=document.createElement('div');
    row.id='row-h'+h.id; row.className='habit-row row-enter';
    row.style.userSelect='none';row.style.webkitUserSelect='none';
    row.innerHTML=`<span class="habit-name">${h.name}</span>`;
    return row;
  });

}

/* ── DEEP LINK / APP OPENER ── */
const APP_SCHEMES = {
  'ankiapp.com':      'ankiapp://',
  'id373493387':      'anki://',
  'duolingo.com':     'duolingo://',
  'quizlet.com':      'quizlet://',
  'strava.com':       'strava://',
  'headspace.com':    'headspace://',
  'calm.com':         'calm://',
  'myfitnesspal.com': 'myfitnesspal://',
  'todoist.com':      'todoist://',
  'notion.so':        'notion://',
  'spotify.com':      'spotify://',
  'youtube.com':      'youtube://',
  'youtu.be':         'youtube://',
  'twitter.com':      'twitter://',
  'x.com':            'twitter://',
  'instagram.com':    'instagram://',
};

function openAppLink(url) {
  if (!url.startsWith('http')) { window.location.href = url; return; }
  let appScheme = null;
  const urlLower = url.toLowerCase();
  for (const [key, scheme] of Object.entries(APP_SCHEMES)) {
    if (urlLower.includes(key)) { appScheme = scheme; break; }
  }
  if (appScheme) {
    let appOpened = false;
    const start = Date.now();
    const onBlur = () => { appOpened = true; clearTimeout(fallbackTimer); };
    window.addEventListener('blur', onBlur, { once: true });
    const fallbackTimer = setTimeout(() => {
      window.removeEventListener('blur', onBlur);
      if (!appOpened && Date.now() - start < 2000) window.location.href = url;
    }, 1500);
    window.location.href = appScheme;
  } else {
    window.open(url, '_blank');
  }
}

function handleHabitTap(hId){
  const h=state.habits.find(x=>x.id===hId); if(!h) return;
  const row=document.getElementById(`row-h${hId}`);
  if(isWeekendHabit(h)) completeWeekend(hId);
  else habitComplete(hId,true);
  if(h.url){ try{ openAppLink(h.url); }catch(e){} }
  if(row) animateRemoveRow(row, ()=>renderHome(), 400);
  else renderHome();
}

function applyBgColor(v,persist){
  if(!v||!/^#[0-9a-fA-F]{6}$/i.test(v)) return;
  document.documentElement.style.setProperty('--bg',v);
  document.body.style.background=v;
  document.querySelectorAll('.screen,.habit-detail-screen').forEach(s=>s.style.background=v);
  document.querySelector('meta[name="theme-color"]')?.setAttribute('content',v);
  if(persist){ state.bg=v; save(); renderSettings(); }
}
function copyHabits(){
  const DAY_LETTERS=['P','W','Ś','C','P','S','N'];
  const today=jsDay(); // 0=Mon…6=Sun
  const dayLetter=DAY_LETTERS[today];
  const lines = [];
  state.sectors.forEach(sec => {
    const habits = state.habits.filter(h => h.sectorId === sec.id);
    if(!habits.length) return;
    lines.push(`[${sec.name}]`);
    habits.forEach(h => {
      lines.push(`${dayLetter} ${h.name}`);
    });
    lines.push('');
  });
  const text = lines.join('\n').trim();

  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('[onclick="copyHabits()"] div');
    if(btn){ const orig = btn.innerHTML; btn.innerHTML = '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#00ff88" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'; setTimeout(()=>{ btn.innerHTML=orig; },1800); }
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
  });
}

// Targeted single-sector update (no scroll reset, no full rebuild)
function refreshSector(sId){
  const el=document.getElementById('sb-'+sId); if(!el) return;
  const sec=state.sectors.find(s=>s.id===sId); if(!sec) return;
  const sh=state.habits
    .map((h,i)=>({h,i}))
    .filter(({h})=>h.sectorId===sId)
    .sort((a,b)=>(a.h.order||0)-(b.h.order||0)||(a.i-b.i))

// ── SHARED TOUCH DRAG FACTORY ──
function makeTouchDraggable(opts){
  // opts: { rowSelector, idAttr, liftPrefix, liftClass, highlightFn, clearFn, reorderFn, openFn, renderFn }
  let id=null,overId=null,moved=false,active=false,startX=0,startY=0,timer=null,el=null;
  function _move(e){
    if(!id) return;
    const dx=Math.abs(e.touches[0].clientX-startX),dy=Math.abs(e.touches[0].clientY-startY);
    if(dx>8||dy>8){
      if(!active){ clearTimeout(timer); timer=null; id=null; if(el){ el.removeEventListener('touchmove',_move); el=null; } return; }
      moved=true; e.preventDefault();
      const target=document.elementFromPoint(e.touches[0].clientX,e.touches[0].clientY)?.closest(opts.rowSelector);
      const oid=target?.dataset[opts.idAttr];
      if(oid&&oid!==id&&oid!==overId){ overId=oid; opts.highlightFn&&opts.highlightFn(oid); }
    }
  }
  return {
    start(e,rowId){
      id=rowId; moved=false; active=false;
      startX=e.touches[0].clientX; startY=e.touches[0].clientY;
      el=e.currentTarget;
      if(el) el.addEventListener('touchmove',_move,{passive:false});
      timer=setTimeout(()=>{ active=true; document.getElementById(opts.liftPrefix+rowId)?.classList.add(opts.liftClass||'drag-lift'); },280);
    },
    move(e){ /* handled by per-element listener */ },
    end(e,ctxId){
      clearTimeout(timer); timer=null;
      if(el){ el.removeEventListener('touchmove',_move); el=null; }
      document.getElementById(opts.liftPrefix+id)?.classList.remove(opts.liftClass||'drag-lift');
      if(active&&moved&&overId&&overId!==id) opts.reorderFn(id,overId);
      else{ opts.clearFn&&opts.clearFn(); if(!active&&!moved) opts.openFn(id); else opts.renderFn&&opts.renderFn(); }
      id=null; overId=null; moved=false; active=false;
    },
    get active(){ return active; },
    get moved(){ return moved; },
  };
}

// ── SWIPE HELPERS ──
function makeHorizontalSwipe(el, onClose, opts={}){
  const edge=opts.edge??44, thresh=opts.thresh??80;
  const sec=opts.secondary||null, secOff=opts.secOffset??-28, secSc=opts.secScale??0.28;
  const ANIM='transform .32s cubic-bezier(.32,.72,0,1)';
  let s0=0, t0=0, moved=false;
  el.addEventListener('touchstart',e=>{ s0=e.touches[0].clientX; t0=Date.now(); moved=false; },{passive:true});
  el.addEventListener('touchmove',e=>{
    if(s0>edge) return;
    const dx=e.touches[0].clientX-s0; if(dx<4) return;
    moved=true;
    const pct=Math.min(dx/window.innerWidth*100,100);
    el.style.transition='none'; el.style.transform=`translateX(${dx}px)`;
    if(sec){ sec.style.transition='none'; sec.style.transform=`translateX(${secOff+pct*secSc}%)`; }
  },{passive:true});
  el.addEventListener('touchend',e=>{
    if(!moved){ el.style.transform=''; return; }
    const dx=e.changedTouches[0].clientX-s0;
    const velocity=dx/Math.max(Date.now()-t0,1);
    moved=false;
    const shouldClose=dx>thresh||velocity>0.5;
    if(shouldClose){
      el.style.transition=ANIM; el.style.transform=`translateX(${window.innerWidth}px)`;
      if(sec){ sec.style.transition=ANIM; sec.style.transform=`translateX(0%)`; }
      setTimeout(()=>{ onClose(); el.style.transition=''; el.style.transform=''; if(sec) sec.style.transition=''; },320);
    } else {
      el.style.transition=ANIM; el.style.transform='translateX(0)';
      if(sec){ sec.style.transition=ANIM; sec.style.transform=`translateX(${secOff}%)`; }
    }
  },{passive:true});
}

function makeVerticalSwipe(el, onClose, thresh=100){
  let s0=0, moved=false;
  el.addEventListener('touchstart',e=>{ s0=e.touches[0].clientY; moved=false; },{passive:true});
  el.addEventListener('touchmove',e=>{
    const dy=e.touches[0].clientY-s0; if(dy<20) return;
    moved=true;
    el.style.transition='none'; el.style.transform=`translateY(${Math.min(dy,window.innerHeight)}px)`;
  },{passive:true});
  el.addEventListener('touchend',e=>{
    if(!moved){ el.style.transform=''; return; }
    const dy=e.changedTouches[0].clientY-s0; moved=false;
    el.style.transition='';
    if(dy>thresh){ onClose(); el.style.transform=''; }
    else el.style.transform='translateY(0)';
  },{passive:true});
}

// Compat shim — existing callers used makeSwipeBack(el, fn, opts)
function makeSwipeBack(el, onClose, opts={}){
  if(opts.dir==='y') makeVerticalSwipe(el, onClose, opts.thresh||100);
  else makeHorizontalSwipe(el, onClose, opts);
}


// Inline Manifest for PWA (Add to Home Screen)
(()=>{
  const manifest={
    name:'Habits',short_name:'Habits',
    display:'standalone',
    background_color:state.bg||'#162E1A',
    theme_color:state.bg||'#162E1A',
    start_url:location.pathname||'/',
    icons:[{src:document.querySelector('link[rel="apple-touch-icon"]')?.href||'',sizes:'512x512',type:'image/png'}]
  };
  const blob=new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'});
  const url=URL.createObjectURL(blob);
  const link=document.querySelector('link[rel="manifest"]');
  if(link) link.href=url;
})();

// Service Worker – offline support
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// ── Delegated touch on habitsList (set up once at init) ──
(()=>{
  const list=document.getElementById('habitsList');
  if(!list) return;
  let _ts=0, _ty=0, _moved=false, _hId=null;
  list.addEventListener('touchstart',e=>{
    const row=e.target.closest('.habit-row'); if(!row) return;
    _hId=row.id.replace('row-h',''); _ts=Date.now(); _ty=e.touches[0].clientY; _moved=false;
  },{passive:true});
  list.addEventListener('touchmove',e=>{
    if(Math.abs(e.touches[0].clientY-_ty)>5) _moved=true;
  },{passive:true});
  list.addEventListener('touchend',e=>{
    if(!_moved&&_hId&&Date.now()-_ts<400) handleHabitTap(_hId);
    _hId=null;
  },{passive:true});
  list.addEventListener('click',e=>{
    const row=e.target.closest('.habit-row'); if(!row) return;
    const hId=row.id.replace('row-h',''); handleHabitTap(hId);
  });
})();

renderHome();
setInterval(renderHome,60000);
document.addEventListener('visibilitychange',()=>{
  if(!document.hidden){ invalidateActiveSectorCache(); renderHome(); return; }
  document.querySelectorAll('.sector-block.expanded').forEach(block=>{
    const sId=block.id.replace('sb-','');
    if(sId) saveSectorSilent(sId);
  });
  saveNow(); // flush any pending debounced save before app goes to background
});
window.addEventListener('pagehide',()=>{
  document.querySelectorAll('.sector-block.expanded').forEach(block=>{
    const sId=block.id.replace('sb-','');
    if(sId) saveSectorSilent(sId);
  });
  saveNow();
});

// Slide-down panels (habitDetail)
makeSwipeBack(document.getElementById('habitDetail'), ()=>{ closeHabitDetail(); document.getElementById('habitDetail').style.transform=''; }, {dir:'y', thresh:100});
makeSwipeBack(document.getElementById('settings'), closeSettings, {
  edge:44, thresh:70, secondary:document.getElementById('home'), secOffset:-28, secScale:0.28,
  doubleRaf:true
});

// Apply saved background on load
(()=>{
  const bg=state.bg||'#162E1A';
  document.documentElement.style.setProperty('--bg',bg);
  document.body.style.background=bg;
})();
</script>
